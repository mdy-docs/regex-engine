name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  native:
    name: Native smoke test (make test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test

  # The buffer-edge regression tests (docs/IMPROVEMENTS.md #1.4/#1.5) only
  # prove anything under a sanitizer -- a plain build can pass them by
  # silently reading adjacent memory -- so this job, not `native`, is what
  # actually guards the memory-safety fixes against regression.
  asan:
    name: ASan+UBSan smoke test (make test-asan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test-asan

  wasm:
    name: WASM smoke test (make test-wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
      - run: make test-wasm
