name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  native:
    name: Native smoke test (make test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test

  # The buffer-edge regression tests (docs/IMPROVEMENTS.md #1.4/#1.5) only
  # prove anything under a sanitizer -- a plain build can pass them by
  # silently reading adjacent memory -- so this job, not `native`, is what
  # actually guards the memory-safety fixes against regression.
  asan:
    name: ASan+UBSan smoke test (make test-asan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test-asan

  wasm:
    name: WASM smoke test (make test-wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # setup-emsdk must run BEFORE setup-node: both prepend to GITHUB_PATH
      # and later entries win, so this order makes `node` resolve to
      # setup-node's install rather than emsdk's bundled binary (which has
      # shipped without the exec bit -- "make: node: Permission denied").
      # emcc is unaffected either way; it locates its own node via EM_CONFIG,
      # not PATH.
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: make test-wasm
