name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  native:
    name: Native smoke test (make test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test

  wasm:
    name: WASM smoke test (make test-wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
      - run: make test-wasm
